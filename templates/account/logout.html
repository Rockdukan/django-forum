{% extends "account/base.html" %}
{% load i18n %}

{% block title %}Выход{% endblock %}
{% block head_title %}Выход{% endblock %}
{% block content_account %}
<p class="auth-lead">Вы уверены, что хотите выйти?</p>
<form method="post" action="{% url 'account_logout' %}" class="auth-form">
  {% csrf_token %}
  {% if redirect_field_value %}
  <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
  {% endif %}
  <button type="submit" class="btn btn-primary btn-block">Выйти</button>
</form>
<p class="auth-footer mt-3">
  <a href="{% url 'forum:index' %}">Отмена</a>
</p>
{% endblock %}
