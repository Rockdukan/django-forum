{% extends "base.html" %}
{% block title %}Перенос темы{% endblock %}
{% block forum_content %}
<div class="create-form-container">
  <h2>Перенести: {{ topic.title }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.category.label_tag }}{{ form.category }}
    <p><button type="submit" class="submit-button">Перенести</button>
    <a href="{{ topic.get_absolute_url }}" class="cancel-button">Отмена</a></p>
  </form>
</div>
{% endblock %}
